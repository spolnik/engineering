<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">No common libraries in microservices</title>
  <desc id="desc">A comparison of hidden coupling through a common internal library versus safer reuse through templates, contracts, platform services, CI policy, and automated refactoring.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#f59e0b" />
    </marker>
    <marker id="arrowGood" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#5eead4" />
    </marker>
    <style>
      .bg { fill: #06090d; }
      .service { fill: #0f1720; stroke: #2dd4bf; stroke-width: 1.3; rx: 12; }
      .bad { fill: #17120b; stroke: #f59e0b; stroke-width: 1.4; rx: 14; }
      .good { fill: #10151f; stroke: #94a3b8; stroke-width: 1.2; rx: 14; }
      .title { fill: #f8fafc; font: 700 25px Arial, sans-serif; }
      .label { fill: #e5e7eb; font: 700 18px Arial, sans-serif; }
      .small { fill: #a7b0be; font: 13px Arial, sans-serif; }
      .tiny { fill: #94a3b8; font: 12px Arial, sans-serif; }
      .badArrow { stroke: #f59e0b; stroke-width: 2.1; fill: none; marker-end: url(#arrow); }
      .goodArrow { stroke: #5eead4; stroke-width: 2.1; fill: none; marker-end: url(#arrowGood); }
      .pill { fill: #17202c; stroke: #334155; rx: 18; }
    </style>
  </defs>
  <rect class="bg" width="1200" height="760" />
  <text x="70" y="55" class="title">No Common Libraries: Keep Reuse Out of the Runtime Coupling Path</text>

  <rect x="90" y="135" width="240" height="100" class="service" />
  <text x="122" y="170" class="label">Service A</text>
  <text x="122" y="196" class="small">owned code, own release</text>
  <rect x="90" y="305" width="240" height="100" class="service" />
  <text x="122" y="340" class="label">Service B</text>
  <text x="122" y="366" class="small">owned code, own release</text>
  <rect x="90" y="475" width="240" height="100" class="service" />
  <text x="122" y="510" class="label">Service C</text>
  <text x="122" y="536" class="small">owned code, own release</text>

  <rect x="455" y="245" width="290" height="150" class="bad" />
  <text x="485" y="285" class="label">Internal common JAR</text>
  <text x="485" y="314" class="small">domain types, clients, filters,</text>
  <text x="485" y="336" class="small">auth assumptions, transitive deps</text>
  <text x="485" y="362" class="small">one change can force many upgrades</text>

  <path class="badArrow" d="M330 185C400 210 420 265 455 305" />
  <path class="badArrow" d="M330 355H455" />
  <path class="badArrow" d="M330 525C400 500 420 445 455 365" />

  <rect x="865" y="110" width="245" height="90" class="good" />
  <text x="895" y="143" class="label">Templates</text>
  <text x="895" y="168" class="small">copy at service creation</text>
  <rect x="865" y="230" width="245" height="90" class="good" />
  <text x="895" y="263" class="label">API contracts</text>
  <text x="895" y="288" class="small">OpenAPI, AsyncAPI, Pact</text>
  <rect x="865" y="350" width="245" height="90" class="good" />
  <text x="895" y="383" class="label">Platform services</text>
  <text x="895" y="408" class="small">runtime capabilities via APIs</text>
  <rect x="865" y="470" width="245" height="90" class="good" />
  <text x="895" y="503" class="label">CI and agents</text>
  <text x="895" y="528" class="small">policy, recipes, local PRs</text>

  <path class="goodArrow" d="M745 285C810 245 825 160 865 155" />
  <path class="goodArrow" d="M745 310H865" />
  <path class="goodArrow" d="M745 335C810 350 825 388 865 395" />
  <path class="goodArrow" d="M745 365C810 410 825 505 865 515" />

  <rect x="80" y="690" width="1040" height="34" class="pill" />
  <text x="105" y="712" class="tiny">Rule: reuse through templates, contracts, platform APIs, CI checks, and agent campaigns. Avoid runtime artifacts that force coordinated service upgrades.</text>
</svg>
