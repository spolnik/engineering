<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">Multi-repo workspace for AI coding agents</title>
  <desc id="desc">A map showing a parent workspace containing independent repositories, with broad agent search and narrow service-owned pull requests.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#5eead4" />
    </marker>
    <style>
      .bg { fill: #06090d; }
      .folder { fill: #0b1220; stroke: #334155; stroke-width: 1.3; rx: 16; }
      .repo { fill: #0f1720; stroke: #2dd4bf; stroke-width: 1.3; rx: 12; }
      .repo2 { fill: #111827; stroke: #f59e0b; stroke-width: 1.3; rx: 12; }
      .repo3 { fill: #10151f; stroke: #94a3b8; stroke-width: 1.1; rx: 12; }
      .title { fill: #f8fafc; font: 700 25px Arial, sans-serif; }
      .label { fill: #e5e7eb; font: 700 18px Arial, sans-serif; }
      .small { fill: #a7b0be; font: 13px Arial, sans-serif; }
      .tiny { fill: #94a3b8; font: 12px Arial, sans-serif; }
      .arrow { stroke: #5eead4; stroke-width: 2.2; fill: none; marker-end: url(#arrow); }
      .mutedArrow { stroke: #64748b; stroke-width: 1.8; fill: none; marker-end: url(#arrow); stroke-dasharray: 6 6; }
      .pill { fill: #17202c; stroke: #334155; rx: 18; }
    </style>
  </defs>
  <rect class="bg" width="1200" height="760" />
  <text x="70" y="55" class="title">Multi-Repo Workspace: Monorepo-Like Discovery, Polyrepo Ownership</text>

  <rect x="70" y="105" width="520" height="470" class="folder" />
  <text x="105" y="145" class="label">company-engineering/</text>
  <text x="105" y="170" class="small">parent directory used as the agent session root</text>

  <rect x="105" y="205" width="190" height="80" class="repo" />
  <text x="130" y="238" class="label">checkout-service</text>
  <text x="130" y="262" class="small">own repo, own DB</text>
  <rect x="360" y="205" width="190" height="80" class="repo2" />
  <text x="385" y="238" class="label">billing-service</text>
  <text x="385" y="262" class="small">own repo, own DB</text>
  <rect x="105" y="325" width="190" height="80" class="repo3" />
  <text x="130" y="358" class="label">catalog-service</text>
  <text x="130" y="382" class="small">own repo, own DB</text>
  <rect x="360" y="325" width="190" height="80" class="repo" />
  <text x="385" y="358" class="label">inventory-service</text>
  <text x="385" y="382" class="small">own repo, own DB</text>
  <rect x="230" y="445" width="190" height="80" class="repo3" />
  <text x="255" y="478" class="label">150 services</text>
  <text x="255" y="502" class="small">small owned codebases</text>

  <rect x="690" y="130" width="350" height="110" class="repo2" />
  <text x="720" y="165" class="label">AI coding agent</text>
  <text x="720" y="191" class="small">starts at parent directory</text>
  <text x="720" y="213" class="small">searches broadly before editing</text>

  <rect x="690" y="310" width="350" height="110" class="repo" />
  <text x="720" y="345" class="label">Reconnaissance</text>
  <text x="720" y="371" class="small">find producers, consumers,</text>
  <text x="720" y="393" class="small">contracts, tests, examples</text>

  <rect x="690" y="490" width="350" height="110" class="repo3" />
  <text x="720" y="525" class="label">Narrow pull requests</text>
  <text x="720" y="551" class="small">one service-owned change</text>
  <text x="720" y="573" class="small">per reviewable unit</text>

  <path class="arrow" d="M590 245C645 230 660 200 690 185" />
  <path class="arrow" d="M590 365H690" />
  <path class="arrow" d="M590 485C645 500 660 530 690 545" />
  <path class="mutedArrow" d="M865 240V310" />
  <path class="mutedArrow" d="M865 420V490" />

  <rect x="80" y="690" width="1040" height="34" class="pill" />
  <text x="105" y="712" class="tiny">Rule: let the agent read the whole architecture, but make it change the smallest owned repository that can solve the task.</text>
</svg>
